# ============================================================
# signmate — docker-compose 部署配置
# 使用方式：
#   cp .env.example .env    # 编辑环境变量
#   cp config/secrets.yaml.example config/secrets.yaml  # 编辑凭据
#   docker compose up -d
# ============================================================

services:
  signmate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signmate
    restart: unless-stopped
    # config/data/logs 需要可写；容器启动时会自动修正挂载目录权限
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "9999:6668"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - WEB_PORT=6668
      - SIGNMATE_AUTH_USERNAME=${SIGNMATE_AUTH_USERNAME:-admin}
      - SIGNMATE_AUTH_PASSWORD=${SIGNMATE_AUTH_PASSWORD:-}
      - SIGNMATE_AUTH_DISABLED=${SIGNMATE_AUTH_DISABLED:-false}
      - SIGNMATE_EXPERIMENTAL_SIGNIN_MODE=${SIGNMATE_EXPERIMENTAL_SIGNIN_MODE:-}
      - SIGNMATE_API_FALLBACK_PLAYWRIGHT=${SIGNMATE_API_FALLBACK_PLAYWRIGHT:-true}
      - SIGNMATE_BROWSER_ENGINE=${SIGNMATE_BROWSER_ENGINE:-playwright}
      - SIGNMATE_CLOAK_ENABLED=${SIGNMATE_CLOAK_ENABLED:-false}
      - SIGNMATE_CLOAK_HUMANIZE=${SIGNMATE_CLOAK_HUMANIZE:-true}
      - SIGNMATE_CLOAK_HEADLESS=${SIGNMATE_CLOAK_HEADLESS:-true}
      - SIGNMATE_CLOAK_GEOIP=${SIGNMATE_CLOAK_GEOIP:-false}
